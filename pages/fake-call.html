<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Incoming Call</title>

<link rel="stylesheet" href="../css/pages/fake-call.css">

</head>

<body>

<div class="call-container">

<img src="../assets/images/user.png" class="caller-photo">

<div class="caller-name" id="callerName">Mom</div>

<div class="caller-number" id="callerNumber">+91 9876543210</div>

<div class="buttons">

<img src="../assets/images/accept.png" class="accept-btn" id="acceptBtn">

<img src="../assets/images/decline.png" class="decline-btn" id="declineBtn">

</div>

</div>

<audio id="ringtone" autoplay loop>
<source src="../assets/ringtone.mp3" type="audio/mpeg">
</audio>

<script src="../js/pages/fake-call.js"></script>

</body>
</html>
