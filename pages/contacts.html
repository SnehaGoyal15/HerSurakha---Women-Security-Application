<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacts - HerSuraksha</title>

<script type="importmap">
{
"imports": {
"firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
"firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
"firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
}
}
</script>

<link rel="stylesheet" href="../css/pages/contacts.css">

</head>

<body>

<div class="dashboard-header">
<div class="header-content">

<img src="../assets/images/dash.png" class="header-logo">

<div class="header-title" id="welcomeMessage"></div>

<div class="header-help" id="helpBtn">Help?</div>

</div>
</div>


<div class="contacts-container">

<div id="contactsList" class="contacts-list">
<div class="loading">Loading contacts...</div>
</div>

<button id="addNewContact" class="add-contact-btn">

<img src="../assets/images/add.png" class="add-icon">

<span>Add New Contact</span>

</button>

</div>


<div class="dashboard-footer">

<div class="footer-content">

<div class="icon-box" id="homeBtn">
<img src="../assets/images/home.png" class="footer-icon">
<span>Home</span>
</div>

<div class="icon-box active" id="contactsBtn">
<img src="../assets/images/contacts.png" class="footer-icon">
<span>Contacts</span>
</div>

<div class="icon-box" id="addBtn">
<img src="../assets/images/add.png" class="footer-icon">
<span>Add</span>
</div>

<div class="icon-box" id="locationBtn">
<img src="../assets/images/location.png" class="footer-icon">
<span>Location</span>
</div>

<div class="icon-box" id="accountBtn">
<img src="../assets/images/acc.png" class="footer-icon">
<span>Account</span>
</div>

</div>

</div>

<script type="module" src="../js/pages/contacts.js"></script>

</body>
</html>
