<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HerSuraksha</title>
    
    <link rel="stylesheet" href="../css/pages/dashboard.css">
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>

<!-- HEADER WITH LOGO AND PERSONALIZED MESSAGE -->
<div class="dashboard-header">
    <div class="header-content">
        <img src="../assets/images/dash.png" class="header-logo" alt="Logo">
        <div class="header-title" id="welcomeMessage">
            <!-- Personalized message from JS -->
        </div>
        <div class="header-help" id="helpBtn">Help?</div>
    </div>
</div>

<!-- MAIN BODY -->
<div class="dashboard-main">
    <div class="cards-container">
        
        <!-- SOS CARD -->
        <div class="action-card" id="sosCard">
            <img src="../assets/images/sos.png" class="card-image" alt="SOS">
            <span class="card-title">SOS Emergency</span>
            <span class="card-desc">Instant alert to all contacts</span>
        </div>

        <!-- FAKE CALL CARD -->
        <div class="action-card" id="fakeCallCard">
            <img src="../assets/images/fake-call.png" class="card-image" alt="Fake Call">
            <span class="card-title">Fake Call</span>
            <span class="card-desc">Simulate incoming call</span>
        </div>
    </div>

    <div class="safety-tip">
        ⚡ Quick Tip: Always share your live location with trusted contacts when travelling alone.
    </div>
</div>

<!-- FOOTER WITH 5 ICONS (including ACCOUNT) -->
<div class="dashboard-footer">
    <div class="footer-content">
        <div class="icon-box active" id="homeBtn">
            <img src="../assets/images/home.png" class="footer-icon" alt="Home">
            <span>Home</span>
        </div>
        <div class="icon-box" id="contactsBtn">
            <img src="../assets/images/contacts.png" class="footer-icon" alt="Contacts">
            <span>Contacts</span>
        </div>
        <div class="icon-box" id="addBtn">
            <img src="../assets/images/add.png" class="footer-icon" alt="Add">
            <span>Add</span>
        </div>
        <div class="icon-box" id="locationBtn">
            <img src="../assets/images/location.png" class="footer-icon" alt="Location">
            <span>Location</span>
        </div>
        <!-- ACCOUNT BUTTON -->
        <div class="icon-box" id="accountBtn">
            <img src="../assets/images/acc.png" class="footer-icon" alt="Account">
            <span>Account</span>
        </div>
    </div>
</div>

<script type="module" src="../js/pages/dashboard.js"></script>
</body>
</html>
